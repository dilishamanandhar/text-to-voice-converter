<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Speech Converter</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>🎤 Text to Speech Converter</h1>
    
    <textarea id="text-input" placeholder="Type or paste text here..."></textarea>
    
    <div class="controls">
      <div class="control-group">
        <label for="voice-select">Voice:</label>
        <select id="voice-select"></select>
      </div>
      
      <div class="control-group">
        <label for="rate">Speed:</label>
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1">
        <span id="rate-value">1x</span>
      </div>
      
      <div class="control-group">
        <label for="pitch">Pitch:</label>
        <input type="range" id="pitch" min="0.5" max="2" step="0.1" value="1">
        <span id="pitch-value">1x</span>
      </div>
    </div>
    
    <div class="buttons">
      <button class="btn btn-speak" onclick="speakText()">▶ Speak</button>
      <button class="btn btn-pause" onclick="pauseSpeech()">⏸ Pause</button>
      <button class="btn btn-resume" onclick="resumeSpeech()">▶ Resume</button>
      <button class="btn btn-stop" onclick="stopSpeech()">⏹ Stop</button>
      <button class="btn btn-clear" onclick="clearText()">🗑 Clear</button>
    </div>
    
    <div id="status"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
